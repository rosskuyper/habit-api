# https://docs.aws.amazon.com/codebuild/latest/userguide/build-spec-ref.html
version: 0.2

env:
  variables:
    NODE_ENV: 'production'
  parameter-store:
    SLACK_WEBHOOK: '/habit-api/slack-webhook'

phases:
  install:
    runtime-versions:
      nodejs: 12
    commands:
      - curl -OLs https://releases.hashicorp.com/terraform/0.14.2/terraform_0.14.2_linux_amd64.zip
      - unzip -qq terraform_0.14.2_linux_amd64.zip
      - mv terraform /usr/local/bin/terraform
      - chmod a+x /usr/local/bin/terraform
      - echo $CODEBUILD_SOURCE_VERSION
      - echo ${CODEBUILD_SOURCE_VERSION/pr/https:\/\/github.com\/rosskuyper\/habit-api\/pull}
      # - export PR_URL=${CODEBUILD_SOURCE_VERSION/pr/https:\/\/github.com\/rosskuyper\/habit-api\/pull}

  pre_build:
    commands:
      - yarn install
      - cd "$CODEBUILD_SRC_DIR/infra"
      - terraform init
      - yarn eslint

  build:
    commands:
      - cd "$CODEBUILD_SRC_DIR"
      - yarn build
      - mv node_modules/ build/
      - cd "$CODEBUILD_SRC_DIR/build"
      - zip -r lambda.zip ./
      - cd "$CODEBUILD_SRC_DIR/infra"
      - terraform plan -out=main.tf.plan
      - terraform apply -auto-approve "main.tf.plan"
      - 'curl -X POST --data-urlencode "payload={\"channel\": \"#ci-cd-notifications\", \"username\": \"ci-bot\", \"text\": \"Backend Deploy Completed - $PR_URL\", \"icon_emoji\": \":male_mage:\"}" $SLACK_WEBHOOK'
    finally:
      - rm -f main.tf.plan
      - cd "$CODEBUILD_SRC_DIR"
      - yarn clean
